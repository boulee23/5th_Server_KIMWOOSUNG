<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
</head>
<body>
<h1>글쓰기</h1>

<form action="/board" method="post">
    <div>
        <label>제목</label><br>
        <input type="text" name="title" required>
    </div>
    <br>
    <div>
        <label>내용</label><br>
        <textarea name="content" rows="10" cols="50"></textarea>
    </div>
    <br>
    <button type="submit">저장</button>
    <a href="/board">취소</a>
</form>
</body>
</html>
